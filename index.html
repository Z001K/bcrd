<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Upper Bouncing Text -->
    <div class="title-text" >
        <span>H</span><span>a</span><span>p</span><span>p</span><span>y</span>
        &nbsp;
        
    </div>

    <!-- Side Panels with Swaying Moonflowers -->
    <div class="side-panel left-panel">
        <div class="moonflower">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div>
            <div class="petal p4"></div><div class="petal p5"></div>
            <div class="flower-center"></div>
        </div>
      <div class="moonflower2">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div>
            <div class="petal p4"></div><div class="petal p5"></div>
            <div class="flower-center"></div>
        </div>
      <div class="moonflower3">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div>
            <div class="petal p4"></div><div class="petal p5"></div>
            <div class="flower-center"></div>
        </div>
    </div>
    
    <div class="side-panel right-panel">
        <div class="moonflower">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div>
            <div class="petal p4"></div><div class="petal p5"></div>
            <div class="flower-center"></div>
        </div>
      <div class="moonflower4">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div>
            <div class="petal p4"></div><div class="petal p5"></div>
            <div class="flower-center"></div>
        </div>
      <div class="moonflower5">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div>
            <div class="petal p4"></div><div class="petal p5"></div>
            <div class="flower-center"></div>
        </div>

    </div>

    <!-- Cake dropping tier by tier -->
    <div class="cake-container">
        <!-- Bottom Tier -->
        <div class="tier tier-bottom">
            <div class="icing"></div>          
        </div>    
                   <!-- Middle Tier -->
        <div class="tier tier-middle">
            <div class="icing"></div>
        </div>
              <!-- Top Tier -->
        <div class="tier tier-top">
            <div class="icing"></div>
                      <!-- Candle on top tier -->
        <div class="candle">
            <div class="candle-flame"></div>
        </div>
        </div>
      
      <div class="cake-plate"></div>
    </div>
  
  <div class="title-text" style="top: 75%;">
       <span>B</span><span>i</span><span>r</span><span>t</span><span>h</span><span>d</span><span>a</span><span>y</span>
        &nbsp;
    </div>

</body>
</html>
